name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python sidecar
        run: |
          pip install curl_cffi>=0.7 websocket-client>=1.7 requests>=2.31 pyinstaller
          pyinstaller --onefile --name claude_fetch --distpath resources --noconfirm sidecar/claude_fetch.py

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron installer
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
